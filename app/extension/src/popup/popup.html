<!doctype html><html><head><meta charset="UTF-8" /><title>LinkedIn Capture</title><style>body{font:14px system-ui;min-width:360px;margin:16px;color:#172033}label{display:block;font-weight:600;margin-top:10px}input,textarea{box-sizing:border-box;width:100%;margin-top:4px;padding:7px}textarea{min-height:80px}button{margin:12px 8px 0 0;padding:8px 10px}#status{margin-top:12px}.warning{color:#8a4b00}</style></head><body><h1>Review LinkedIn capture</h1><p id="status" aria-live="polite">Loading capture…</p><form id="capture-form" hidden><label>LinkedIn Post URL / JD URL<input id="sourceUrl" required type="url" placeholder="Paste a LinkedIn post URL, job URL, or JD URL" /></label><label>Author name (Optional)<input id="authorName" /></label><label>Author profile URL (Optional)<input id="authorProfileUrl" type="url" /></label><label>LinkedIn Post Text (Optional)<textarea id="postText"></textarea></label><label>Job-description link (Optional)<input id="jobDescriptionUrl" type="url" /></label><label>Job Description (Optional)<textarea id="jobDescriptionText"></textarea></label><div id="warnings" class="warning"></div><button id="capture-job" type="button">Capture Job Description</button><button id="send" type="submit">Send to App</button><button id="manual" type="button">Open manual entry</button><button id="close" type="button">Close</button></form><form id="job-form" hidden><label>Job Description (Optional)<textarea id="jobDescriptionTextReview"></textarea></label><div id="job-warnings" class="warning"></div><button id="attach-job" type="submit">Use Job Description</button><button id="continue-without-job" type="button">Continue without JD</button><button id="close-job" type="button">Close</button></form><script type="module" src="popup.js"></script></body></html>
